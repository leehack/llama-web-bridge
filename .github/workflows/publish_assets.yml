name: Publish Bridge Assets

on:
  workflow_dispatch:
    inputs:
      assets_tag:
        description: Tag to publish to assets repo (for example v0.1.1), or auto for the next patch tag
        required: true
      assets_repo:
        description: Asset repository in owner/repo format
        required: true
        default: leehack/llama-web-bridge-assets
      llama_cpp_tag:
        description: Optional llama.cpp tag override; defaults to llama_cpp.version
        required: false
        default: ''
      source_ref:
        description: Optional llama-web-bridge source ref/SHA to build; defaults to the workflow ref
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ASSETS_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.assets_tag || github.ref_name }}
  ASSETS_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.assets_repo || 'leehack/llama-web-bridge-assets' }}
  REQUESTED_LLAMA_CPP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.llama_cpp_tag || '' }}
  REQUESTED_SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.sha }}

permissions:
  contents: read

concurrency:
  group: publish-bridge-assets
  cancel-in-progress: false

jobs:
  build-bridge-assets:
    name: Build bridge assets
    runs-on: ubuntu-latest
    outputs:
      llama_cpp_tag: ${{ steps.resolve-publish-parameters.outputs.llama_cpp_tag }}
      assets_tag: ${{ steps.resolve-publish-parameters.outputs.assets_tag }}
      source_commit: ${{ steps.resolve-publish-parameters.outputs.source_commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.REQUESTED_SOURCE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Validate JS bridge build
        run: |
          npm run check:js
          git ls-files --error-unmatch js/llama_webgpu_bridge.js js/llama_webgpu_bridge_worker.js js/llama_webgpu_bridge.d.ts
          git diff --exit-code -- js/llama_webgpu_bridge.js js/llama_webgpu_bridge_worker.js js/llama_webgpu_bridge.d.ts

      - name: Resolve publish parameters
        id: resolve-publish-parameters
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SOURCE_COMMIT="$(git rev-parse HEAD)"

          if [ "${ASSETS_TAG}" = "auto" ]; then
            if [[ ! "${REQUESTED_SOURCE_REF}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "error: assets_tag=auto requires source_ref to be a full source commit SHA: ${REQUESTED_SOURCE_REF}"
              exit 1
            fi
            if [ "${SOURCE_COMMIT}" != "${REQUESTED_SOURCE_REF}" ]; then
              echo "error: checked-out source commit ${SOURCE_COMMIT} does not match requested source_ref ${REQUESTED_SOURCE_REF}"
              exit 1
            fi
          fi

          if [ "${ASSETS_TAG}" = "auto" ]; then
            LATEST_ASSETS_TAG="$(gh release view --repo "${ASSETS_REPO}" --json tagName --jq '.tagName // ""')"
            if [[ ! "${LATEST_ASSETS_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "error: latest assets release tag is not a vMAJOR.MINOR.PATCH tag: ${LATEST_ASSETS_TAG}"
              exit 1
            fi
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RESOLVED_ASSETS_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            RESOLVED_ASSETS_TAG="${ASSETS_TAG}"
          fi

          if [[ ! "${RESOLVED_ASSETS_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: assets tag must be a vMAJOR.MINOR.PATCH tag or auto: ${RESOLVED_ASSETS_TAG}"
            exit 1
          fi

          if [ -n "$REQUESTED_LLAMA_CPP_TAG" ]; then
            LLAMA_CPP_TAG="$REQUESTED_LLAMA_CPP_TAG"
          else
            LLAMA_CPP_TAG="$(tr -d '[:space:]' < llama_cpp.version)"
          fi
          if [ -z "$LLAMA_CPP_TAG" ]; then
            echo "error: llama.cpp tag is empty"
            exit 1
          fi
          if [[ ! "$LLAMA_CPP_TAG" =~ ^b[0-9]+$ ]]; then
            echo "error: llama.cpp tag must match b[0-9]+: ${LLAMA_CPP_TAG}"
            exit 1
          fi
          echo "ASSETS_TAG=$RESOLVED_ASSETS_TAG" >> "$GITHUB_ENV"
          echo "LLAMA_CPP_TAG=$LLAMA_CPP_TAG" >> "$GITHUB_ENV"
          echo "assets_tag=$RESOLVED_ASSETS_TAG" >> "$GITHUB_OUTPUT"
          echo "llama_cpp_tag=$LLAMA_CPP_TAG" >> "$GITHUB_OUTPUT"
          echo "source_commit=$SOURCE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }}"
          echo "assets_tag=${RESOLVED_ASSETS_TAG}"
          echo "assets_repo=${ASSETS_REPO}"
          echo "llama_cpp_tag=${LLAMA_CPP_TAG}"
          echo "source_commit=${SOURCE_COMMIT}"

      - name: Clone llama.cpp source
        run: |
          git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git third_party/llama_cpp

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build bridge artifacts
        env:
          OUT_DIR: ${{ runner.temp }}/webgpu_bridge_dist
          WEBGPU_BRIDGE_BUILD_MEM64: 1
        run: ./scripts/build_bridge.sh

      - name: Generate manifest and checksums
        env:
          OUT_DIR: ${{ runner.temp }}/webgpu_bridge_dist
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ steps.resolve-publish-parameters.outputs.source_commit }}
        run: |
          test -f "$OUT_DIR/llama_webgpu_bridge.js"
          test -f "$OUT_DIR/llama_webgpu_bridge_worker.js"
          test -f "$OUT_DIR/llama_webgpu_bridge.d.ts"
          test -f "$OUT_DIR/llama_webgpu_core.js"
          test -f "$OUT_DIR/llama_webgpu_core.wasm"
          test -f "$OUT_DIR/llama_webgpu_core_mem64.js"
          test -f "$OUT_DIR/llama_webgpu_core_mem64.wasm"

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone

          out_dir = os.environ['OUT_DIR']
          files = [
              'llama_webgpu_bridge.js',
              'llama_webgpu_bridge_worker.js',
              'llama_webgpu_bridge.d.ts',
              'llama_webgpu_core.js',
              'llama_webgpu_core.wasm',
              'llama_webgpu_core_mem64.js',
              'llama_webgpu_core_mem64.wasm',
          ]

          manifest = {
              'bridge_assets_tag': os.environ['ASSETS_TAG'],
              'source_repository': os.environ['SOURCE_REPO'],
              'source_commit': os.environ['SOURCE_COMMIT'],
              'llama_cpp_tag': os.environ['LLAMA_CPP_TAG'],
              'generated_at_utc': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'files': {},
          }

          checksums = []
          for name in files:
              path = os.path.join(out_dir, name)
              with open(path, 'rb') as f:
                  data = f.read()
              digest = hashlib.sha256(data).hexdigest()
              manifest['files'][name] = {
                  'size_bytes': len(data),
                  'sha256': digest,
              }
              checksums.append(f'{digest}  {name}')

          with open(os.path.join(out_dir, 'manifest.json'), 'w', encoding='utf-8') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')

          with open(os.path.join(out_dir, 'sha256sums.txt'), 'w', encoding='utf-8') as f:
              f.write('\n'.join(checksums))
              f.write('\n')
          PY

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: webgpu-bridge-dist
          path: |
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge_worker.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge.d.ts
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.wasm
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.wasm
            ${{ runner.temp }}/webgpu_bridge_dist/manifest.json
            ${{ runner.temp }}/webgpu_bridge_dist/sha256sums.txt

  publish-assets-repo:
    name: Publish to assets repository
    needs: build-bridge-assets
    runs-on: ubuntu-latest
    env:
      ASSETS_TAG: ${{ needs.build-bridge-assets.outputs.assets_tag }}
    steps:
      - name: Validate assets PAT secret
        env:
          ASSETS_PAT: ${{ secrets.WEBGPU_BRIDGE_ASSETS_PAT }}
        run: |
          if [ -z "$ASSETS_PAT" ]; then
            echo "error: WEBGPU_BRIDGE_ASSETS_PAT secret is required"
            exit 1
          fi

      - name: Checkout assets repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ASSETS_REPO }}
          token: ${{ secrets.WEBGPU_BRIDGE_ASSETS_PAT }}
          path: assets-repo

      - name: Download bridge assets artifact
        uses: actions/download-artifact@v4
        with:
          name: webgpu-bridge-dist
          path: bridge-dist

      - name: Publish assets and tag
        run: |
          if git -C assets-repo ls-remote --exit-code --tags origin "refs/tags/$ASSETS_TAG" >/dev/null 2>&1; then
            echo "error: tag already exists in assets repo: $ASSETS_TAG"
            exit 1
          fi

          cp bridge-dist/* assets-repo/

          cd assets-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add llama_webgpu_bridge.js llama_webgpu_bridge_worker.js llama_webgpu_bridge.d.ts llama_webgpu_core.js llama_webgpu_core.wasm llama_webgpu_core_mem64.js llama_webgpu_core_mem64.wasm manifest.json sha256sums.txt

          if git diff --cached --quiet; then
            echo "No asset changes detected; skipping commit and tag."
            exit 0
          fi

          git commit -m "chore: publish webgpu bridge $ASSETS_TAG"
          git push origin HEAD

          git tag "$ASSETS_TAG"
          git push origin "$ASSETS_TAG"

      - name: Create or update assets release
        env:
          GH_TOKEN: ${{ secrets.WEBGPU_BRIDGE_ASSETS_PAT }}
          ASSETS_TAG: ${{ env.ASSETS_TAG }}
          ASSETS_REPO: ${{ env.ASSETS_REPO }}
          LLAMA_CPP_TAG: ${{ needs.build-bridge-assets.outputs.llama_cpp_tag }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ needs.build-bridge-assets.outputs.source_commit }}
        run: |
          NOTES="$(cat <<EOF
          Bridge assets published from ${SOURCE_REPO}@${SOURCE_COMMIT} (llama.cpp ${LLAMA_CPP_TAG}).

          State persistence APIs included:
          - stateSaveFile(path, tokens)
          - stateLoadFile(path, tokenCapacity)
          - stateSaveBytes(tokens)
          - stateLoadBytes(bytes, tokenCapacity)

          State snapshots are model/build/load-parameter coupled. File APIs use WASMFS-local paths; use byte APIs for app-managed durable storage.
          EOF
          )"

          if gh release view "$ASSETS_TAG" --repo "$ASSETS_REPO" >/dev/null 2>&1; then
            gh release edit "$ASSETS_TAG" \
              --repo "$ASSETS_REPO" \
              --title "$ASSETS_TAG" \
              --notes "$NOTES"
          else
            gh release create "$ASSETS_TAG" \
              --repo "$ASSETS_REPO" \
              --verify-tag \
              --title "$ASSETS_TAG" \
              --notes "$NOTES"
          fi
