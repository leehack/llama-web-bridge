name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-webgpu-bridge:
    name: Build WebGPU Bridge (WASM)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      LLAMA_WEBGPU_SMOKE_MODEL_URL: https://huggingface.co/aladar/llama-2-tiny-random-GGUF/resolve/main/llama-2-tiny-random.gguf
      LLAMA_WEBGPU_SMOKE_MODEL_SHA256: 81f226c62d28ed4a1a9b9fa080fcd9f0cc40e0f9d5680036583ff98fbcd035cb
      LLAMA_WEBGPU_SMOKE_MODEL_CACHE: ~/.cache/llama-web-bridge/state-smoke-models
      LLAMA_WEBGPU_SMOKE_ARTIFACTS_DIR: /tmp/state-persistence-smoke-artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Resolve llama.cpp pin
        run: |
          LLAMA_CPP_TAG="$(tr -d '[:space:]' < llama_cpp.version)"
          if [ -z "$LLAMA_CPP_TAG" ]; then
            echo "error: llama_cpp.version is empty"
            exit 1
          fi
          echo "LLAMA_CPP_TAG=$LLAMA_CPP_TAG" >> "$GITHUB_ENV"
          echo "Using llama.cpp ${LLAMA_CPP_TAG}"

      - name: Validate state persistence API contract
        run: python3 scripts/verify_state_persistence_api.py

      - name: Verify CI reliability contract
        run: python3 scripts/verify_ci_reliability.py

      - name: Cache state smoke model
        uses: actions/cache@v4
        with:
          path: ~/.cache/llama-web-bridge/state-smoke-models
          key: state-smoke-model-${{ env.LLAMA_WEBGPU_SMOKE_MODEL_SHA256 }}

      - name: Clone llama.cpp source
        run: |
          git clone --depth 1 --branch "$LLAMA_CPP_TAG" https://github.com/ggml-org/llama.cpp.git third_party/llama_cpp

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build bridge artifacts
        env:
          OUT_DIR: ${{ runner.temp }}/webgpu_bridge_dist
          WEBGPU_BRIDGE_BUILD_MEM64: 1
        run: ./scripts/build_bridge.sh

      - name: Verify outputs
        run: |
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge.js"
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge_worker.js"
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.js"
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.wasm"
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.js"
          test -f "${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.wasm"

      - name: Install Playwright Chromium
        run: |
          python3 -m pip install --user playwright
          python3 -m playwright install --with-deps chromium

      - name: Run state persistence browser smoke
        env:
          BRIDGE_DIST_DIR: ${{ runner.temp }}/webgpu_bridge_dist
        run: python3 scripts/state_persistence_browser_smoke.py

      - name: Upload state persistence smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: state-persistence-smoke-artifacts
          path: ${{ env.LLAMA_WEBGPU_SMOKE_ARTIFACTS_DIR }}
          if-no-files-found: ignore

      - name: Upload bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webgpu-bridge-dist
          path: |
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_bridge_worker.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core.wasm
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.js
            ${{ runner.temp }}/webgpu_bridge_dist/llama_webgpu_core_mem64.wasm
